<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación BDII</title>
    <link rel="icon" type="image/svg+xml" href="file.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--celeste) 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='40' cy='40' r='30' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: floatBg 30s linear infinite;
        }

        @keyframes floatBg {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-80px, -80px); }
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 63, 122, 0.3);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #003D7A 0%, #0055A4 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(135deg, #003D7A 0%, #0055A4 100%);
            border-radius: 50% 50% 0 0;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .header-logo img {
            width: 60px;
            height: 60px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .content {
            padding: 50px 35px 40px;
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 25px;
            display: inline-block;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            width: 120px;
            height: 120px;
            line-height: 120px;
            border-radius: 50%;
        }

        .icon i {
            color: #2E7D32;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.3) rotateZ(-45deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateZ(0);
            }
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #003D7A;
            margin-bottom: 15px;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .text {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        .text strong {
            color: #003D7A;
            font-weight: 600;
        }

        .email-display {
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: inline-block;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        .email-display i {
            color: #1976D2;
            margin-right: 8px;
        }

        .email-display span {
            color: #003D7A;
            font-weight: 600;
            font-size: 14px;
        }

        .button {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #4FC3F7, #81D4FA);
            color: #003D7A;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(79, 195, 247, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            animation: fadeIn 0.6s ease-out 0.5s both;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(79, 195, 247, 0.5);
        }

        .button:active {
            transform: translateY(-1px);
        }

        .button-secondary {
            background: transparent;
            color: #003D7A;
            border: 2px solid #4FC3F7;
            box-shadow: none;
            margin-left: 10px;
        }

        .button-secondary:hover {
            background: #E1F5FE;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }

        .divider {
            margin: 30px 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ddd, transparent);
            animation: fadeIn 0.6s ease-out 0.6s both;
        }

        .footer-text {
            font-size: 12px;
            color: #888;
            margin-bottom: 0;
            animation: fadeIn 0.6s ease-out 0.6s both;
        }

        .footer {
            padding: 25px;
            font-size: 12px;
            color: #999;
            text-align: center;
            background: linear-gradient(135deg, #F8FBFF 0%, #F3F8FF 100%);
            border-top: 1px solid #E8EEF7;
        }

        .footer a {
            color: #4FC3F7;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #003D7A;
            text-decoration: underline;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading .button {
            background: #ccc;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #003D7A;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 35px 20px;
            }

            .title {
                font-size: 22px;
            }

            .icon {
                font-size: 60px;
                width: 100px;
                height: 100px;
                line-height: 100px;
            }

            .text {
                font-size: 14px;
            }

            .button {
                padding: 14px 25px;
                font-size: 15px;
                display: block;
                margin: 10px auto;
            }

            .button-secondary {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">

        <div class="header">
            <div class="header-logo">
                <img src="file.svg" alt="Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-database\' style=\'font-size:40px; color:white;\'></i>';">
            </div>
            <h1>BDII</h1>
        </div>

        <div class="content" id="content">
            <div class="icon">
                <i class="fas fa-envelope-circle-check"></i>
            </div>

            <div class="title" id="title">Confirma tu cuenta</div>

            <div class="text" id="text">
                Tu registro fue exitoso en <strong>BDII</strong>.<br>
                Para empezar a usar la plataforma, confirma tu correo electrónico haciendo clic en el botón de abajo.
            </div>

            <div class="email-display" id="emailDisplay" style="display: none;">
                <i class="fas fa-at"></i>
                <span id="userEmail">correo@example.com</span>
            </div>

            <button class="button" id="confirmBtn" onclick="confirmarCuenta()">
                <i class="fas fa-check-circle"></i> Confirmar cuenta
            </button>

            <button class="button button-secondary" onclick="goToLogin()">
                <i class="fas fa-arrow-left"></i> Volver
            </button>

            <div class="divider"></div>

            <div class="text footer-text">
                Si no creaste esta cuenta, puedes ignorar este mensaje.
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-graduation-cap"></i> Universidad Peruana Los Andes - Base de Datos II
        </div>

    </div>
</div>

<script src="auth.js"></script>
<script>
    let userEmailFromStorage = '';

    document.addEventListener('DOMContentLoaded', function() {
        console.log('Página de confirmación cargada');
        
        userEmailFromStorage = localStorage.getItem('pending_confirmation_email') || localStorage.getItem('user_email') || '';
        
        if (userEmailFromStorage) {
            document.getElementById('emailDisplay').style.display = 'inline-block';
            document.getElementById('userEmail').textContent = userEmailFromStorage;
        }
    });

    function setLoading(isLoading) {
        const btn = document.getElementById('confirmBtn');
        const content = document.getElementById('content');
        
        if (isLoading) {
            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span> Procesando...';
            content.classList.add('loading');
        } else {
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmar cuenta';
            content.classList.remove('loading');
        }
    }

    async function confirmarCuenta() {
        const title = document.getElementById('title');
        const text = document.getElementById('text');
        const icon = document.querySelector('.icon');
        const btn = document.getElementById('confirmBtn');
        const emailDisplay = document.getElementById('emailDisplay');
        
        setLoading(true);
        
        try {
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            title.textContent = '¡Revisa tu correo!';
            icon.innerHTML = '<i class="fas fa-paper-plane" style="color: #1976D2;"></i>';
            icon.style.background = 'linear-gradient(135deg, #E3F2FD, #BBDEFB)';
            text.innerHTML = 'Se ha enviado un enlace de confirmación a:<br><strong>' + userEmailFromStorage + '</strong><br><br>Haz clic en el enlace del correo para activar tu cuenta.';
            btn.style.display = 'none';
            emailDisplay.style.display = 'none';
            
            localStorage.removeItem('pending_confirmation_email');
            
        } catch (error) {
            console.error('Error:', error);
            title.textContent = 'Error';
            icon.innerHTML = '<i class="fas fa-times-circle" style="color: #D32F2F;"></i>';
            icon.style.background = 'linear-gradient(135deg, #FFEBEE, #FFCDD2)';
            text.innerHTML = 'Hubo un problema. Por favor intenta de nuevo más tarde.';
            setLoading(false);
        }
    }

    function goToLogin() {
        window.location.href = 'login.html';
    }

    async function resendConfirmation() {
        if (!userEmailFromStorage) {
            alert('No hay correo pendiente de confirmación');
            return;
        }
        
        setLoading(true);
        
        try {
            const response = await fetch('https://gxsdjbxtzxssnqvphwfv.supabase.co/auth/v1/resend', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4c2RqYnh0enhzc25xdnBod2Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Njk1NDEsImV4cCI6MjA5MTM0NTU0MX0.s76qBSRiQo_RysFH8Kchud_QfXL9gPPYg1kXdJ1LuIY'
                },
                body: JSON.stringify({ email: userEmailFromStorage, type: 'signup' })
            });
            
            if (response.ok) {
                alert('Correo de confirmación reenviado');
            } else {
                throw new Error('Error al reenviar');
            }
        } catch (error) {
            alert('Error al reenviar el correo. Intenta más tarde.');
        } finally {
            setLoading(false);
        }
    }
</script>

</body>
</html>
