<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación Exitosa - BDII</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f7ff 0%, #e6f2ff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Elementos decorativos de fondo */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(23, 162, 184, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 63, 136, 0.15);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #00d4ff 0%, #0d6efd 50%, #0056d2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .content {
            padding: 50px 35px;
            text-align: center;
        }

        .icon-wrapper {
            margin-bottom: 30px;
            animation: bounce 0.6s ease-out 0.2s both;
        }

        @keyframes bounce {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(20px);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            background: linear-gradient(135deg, #00d4ff 0%, #0d6efd 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.3);
            position: relative;
        }

        .icon-circle::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, #00d4ff 0%, #0d6efd 100%);
            border-radius: 50%;
            opacity: 0.2;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.1;
            }
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #003f88;
            margin-bottom: 15px;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        .message-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f7ff 100%);
            border: 2px solid #00d4ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out 0.5s both;
        }

        .message-box p {
            color: #0056d2;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        .button-container {
            animation: fadeIn 0.6s ease-out 0.6s both;
        }

        .button {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #00d4ff 0%, #0d6efd 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.35);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.45);
        }

        .button:hover::before {
            left: 100%;
        }

        .button:active {
            transform: translateY(0);
        }

        .divider {
            margin: 35px 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
        }

        .footer-text {
            font-size: 13px;
            color: #999;
            line-height: 1.5;
            animation: fadeIn 0.6s ease-out 0.7s both;
        }

        .footer {
            padding: 25px;
            background: linear-gradient(135deg, #f8fbff 0%, #f0f7ff 100%);
            text-align: center;
            border-top: 1px solid #e8f0ff;
        }

        .footer p {
            font-size: 12px;
            color: #999;
            margin: 5px 0;
        }

        .footer a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #0056d2;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .content {
                padding: 40px 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .title {
                font-size: 22px;
            }

            .icon-circle {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .button {
                padding: 14px 30px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        
        <div class="header">
            <h1>BDII</h1>
        </div>

        <div class="content">
            <div class="icon-wrapper">
                <div class="icon-circle">✅</div>
            </div>

            <h2 class="title">¡Verificación Exitosa!</h2>

            <p class="subtitle">
                Tu correo electrónico ha sido confirmado correctamente.
            </p>

            <div class="message-box">
                <p>🎉 Tu cuenta está totalmente activada y lista para usar. Ahora tienes acceso a todas las características de la plataforma BDII.</p>
            </div>

            <div class="button-container">
                <button class="button" onclick="irAInicio()">Ir a la Página Principal</button>
            </div>

            <div class="divider"></div>

            <p class="footer-text">
                ¡Gracias por ser parte de nuestra comunidad!
            </p>
        </div>

        <div class="footer">
            <p>© 2026 BDII</p>
            <p>
                <a href="#">Soporte</a> • <a href="#">Políticas</a>
            </p>
        </div>

    </div>
</div>

<script>
    function irAInicio() {
        // Redirigir a la página principal
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
